version: '3.9'

services:
  wewe-rss:
    image: cooderl/wewe-rss-sqlite:latest
    container_name: wewe-rss
    ports:
      - '4000:4000'
    environment:
      - DATABASE_TYPE=sqlite
      # 授权码，请修改为自己的密码
      - AUTH_CODE=wewe-rss-2026
      # 全文输出模式
      - FEED_MODE=fulltext
      # 定时更新：每天 6:00, 12:00, 18:00, 23:00
      - CRON_EXPRESSION=0 6,12,18,23 * * *
      # 每分钟最大请求数
      - MAX_REQUEST_PER_MINUTE=30
      # 连续更新延迟时间，防止被封
      - UPDATE_DELAY_TIME=120s
      # 服务地址（本地部署）
      - SERVER_ORIGIN_URL=http://localhost:4000
      # 开启正文 HTML 清理
      - ENABLE_CLEAN_HTML=true
    volumes:
      - ./data:/app/data
    restart: unless-stopped
